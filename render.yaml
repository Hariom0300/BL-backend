# Render.com Deployment for BL-backend Repository
services:
  # Backend API Service
  - type: web
    name: bl-backend
    env: php
    plan: free
    buildCommand: "composer install --no-dev"
    startCommand: "php -S 0.0.0.0:10000"
    healthCheckPath: /api
    
    # Environment Variables for API
    envVars:
      - key: FRONTEND_URL
        value: https://hariom0300.github.io/BL-frontend
      - key: DB_HOST
        value: localhost
      - key: DB_NAME
        value: dongare_bl_backend
      - key: DB_USER
        value: render
      - key: DB_PASS
        sync: false
      - key: ADMIN_EMAIL
        value: hariomvimal33333@gmail.com
      - key: JWT_SECRET
        value: your-super-secret-jwt-key-change-this
      - key: CORS_ORIGIN
        value: https://hariom0300.github.io/BL-frontend
      - key: ENVIRONMENT
        value: production
      - key: SITE_URL
        value: https://bl-backend.onrender.com
      - key: UPLOAD_PATH
        value: uploads/products/
    
    # Build Configuration
    buildFilter:
      paths:
        - exclude:
          - logs/**
          - vendor/**
          - .git/**
          - README.md
          - .env
    
    # Auto-deployment from GitHub
    repo: https://github.com/Hariom0300/BL-backend
    branch: main
    rootDir: /

  # PostgreSQL Database (Free Tier)
  - type: pserv
    name: bl-backend-database
    plan: free
    env: postgres
    region: oregon

databases:
  - name: dongare_bl_backend
    databaseName: dongare_bl_backend
    user: render

# Health Check Configuration
healthCheck:
  path: /api
  interval: 30s
  timeout: 10s
  gracePeriod: 5s
